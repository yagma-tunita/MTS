basePath: /api/v1
definitions:
  handler.createAdminRequest:
    properties:
      password:
        minLength: 6
        type: string
      real_name:
        type: string
      role:
        maximum: 2
        minimum: 1
        type: integer
      username:
        type: string
    required:
    - password
    - username
    type: object
  handler.createOrderRequest:
    properties:
      cargo_items:
        items:
          $ref: '#/definitions/service.CargoItem'
        minItems: 1
        type: array
      city_id:
        type: integer
      consignee_contact:
        type: string
      end_port_id:
        type: integer
      expected_arrival:
        type: string
      expected_departure:
        type: string
      line_id:
        type: integer
      shipper_company_id:
        type: integer
      shipper_contact:
        type: string
      start_port_id:
        type: integer
      vessel_id:
        type: integer
      voyage_date:
        type: string
    required:
    - cargo_items
    - city_id
    - end_port_id
    - line_id
    - shipper_company_id
    - start_port_id
    - vessel_id
    - voyage_date
    type: object
  handler.loginRequest:
    properties:
      password:
        type: string
      role:
        enum:
        - shipper
        - shipping
        - admin
        type: string
      username:
        type: string
    required:
    - password
    - role
    - username
    type: object
  handler.refreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handler.registerShipperRequest:
    properties:
      company_name:
        type: string
      login_username:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - company_name
    - login_username
    - password
    type: object
  handler.registerShippingRequest:
    properties:
      company_name:
        type: string
      login_username:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - company_name
    - login_username
    - password
    type: object
  handler.updateAdminPasswordRequest:
    properties:
      new_password:
        minLength: 6
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  handler.updateOrderStatusRequest:
    properties:
      status:
        maximum: 4
        minimum: 0
        type: integer
    required:
    - status
    type: object
  handler.updatePasswordRequest:
    properties:
      new_password:
        minLength: 6
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  model.Admin:
    properties:
      admin_id:
        type: integer
      create_time:
        type: string
      delete_time:
        type: string
      password:
        type: string
      real_name:
        type: string
      role:
        type: integer
      update_time:
        type: string
      username:
        type: string
    type: object
  model.City:
    properties:
      city_id:
        type: integer
      city_name:
        type: string
      country:
        type: string
      country_code:
        type: string
      create_time:
        type: string
      delete_time:
        type: string
      latitude:
        type: number
      longitude:
        type: number
      timezone:
        type: string
      update_time:
        type: string
    type: object
  model.OrderCargo:
    properties:
      cargo_name:
        type: string
      cargo_type:
        type: string
      create_time:
        type: string
      delete_time:
        type: string
      detail_id:
        type: integer
      order:
        allOf:
        - $ref: '#/definitions/model.ShippingOrder'
        description: Relationships
      order_id:
        type: integer
      quantity:
        type: number
      subtotal:
        type: number
      unit_price:
        type: number
      update_time:
        type: string
      volume_cubic_meter:
        type: number
      weight_ton:
        type: number
    type: object
  model.Port:
    properties:
      city:
        allOf:
        - $ref: '#/definitions/model.City'
        description: Relationships
      city_id:
        type: integer
      create_time:
        type: string
      delete_time:
        type: string
      latitude:
        type: number
      longitude:
        type: number
      max_draft_meter:
        type: number
      port_code:
        type: string
      port_id:
        type: integer
      port_name:
        type: string
      port_type:
        type: string
      update_time:
        type: string
    type: object
  model.ShipperCompany:
    properties:
      account_status:
        type: integer
      address:
        type: string
      company_id:
        type: integer
      company_name:
        type: string
      contact_phone:
        type: string
      create_time:
        type: string
      delete_time:
        type: string
      legal_representative:
        type: string
      login_password:
        type: string
      login_username:
        type: string
      unified_social_credit_code:
        type: string
      update_time:
        type: string
    type: object
  model.ShippingCompany:
    properties:
      account_status:
        type: integer
      address:
        type: string
      company_id:
        type: integer
      company_name:
        type: string
      contact_person:
        type: string
      contact_phone:
        type: string
      create_time:
        type: string
      delete_time:
        type: string
      login_password:
        type: string
      login_username:
        type: string
      unified_social_credit_code:
        type: string
      update_time:
        type: string
    type: object
  model.ShippingLine:
    properties:
      create_time:
        type: string
      delete_time:
        type: string
      departure_port_name:
        type: string
      description:
        type: string
      destination_port_name:
        type: string
      line_id:
        type: integer
      line_name:
        type: string
      port_sequence:
        description: store as JSON string
        type: string
      shipping_company:
        allOf:
        - $ref: '#/definitions/model.ShippingCompany'
        description: Relationships
      shipping_company_id:
        type: integer
      total_distance_nm:
        type: number
      update_time:
        type: string
    type: object
  model.ShippingOrder:
    properties:
      city:
        $ref: '#/definitions/model.City'
      city_id:
        type: integer
      consignee_contact:
        type: string
      create_time:
        type: string
      delete_time:
        type: string
      departure_port:
        $ref: '#/definitions/model.Port'
      departure_port_id:
        type: integer
      destination_port:
        $ref: '#/definitions/model.Port'
      destination_port_id:
        type: integer
      expected_arrival_date:
        type: string
      expected_departure_date:
        type: string
      load_note:
        $ref: '#/definitions/model.VoyageCargoNote'
      load_note_id:
        type: integer
      order_cargos:
        items:
          $ref: '#/definitions/model.OrderCargo'
        type: array
      order_id:
        type: integer
      order_no:
        type: string
      order_status:
        type: integer
      payment_status:
        type: integer
      shipper_company:
        allOf:
        - $ref: '#/definitions/model.ShipperCompany'
        description: Relationships
      shipper_company_id:
        type: integer
      shipper_contact:
        type: string
      total_cost:
        type: number
      total_volume_cubic_meter:
        type: number
      total_weight_ton:
        type: number
      unload_note:
        $ref: '#/definitions/model.VoyageCargoNote'
      unload_note_id:
        type: integer
      update_time:
        type: string
    type: object
  model.Vessel:
    properties:
      call_sign:
        type: string
      container_teu:
        type: integer
      create_time:
        type: string
      delete_time:
        type: string
      draft_meter:
        type: number
      gross_tonnage:
        type: number
      imo_number:
        type: string
      is_available:
        type: integer
      max_deadweight_ton:
        type: number
      net_tonnage:
        type: number
      shipping_company:
        allOf:
        - $ref: '#/definitions/model.ShippingCompany'
        description: Relationships
      shipping_company_id:
        type: integer
      speed_knot:
        type: number
      update_time:
        type: string
      vessel_id:
        type: integer
      vessel_name:
        type: string
      vessel_type:
        type: string
    type: object
  model.VoyageCargoNote:
    properties:
      cargo_handled_ton:
        type: number
      cargo_name:
        type: string
      cargo_type:
        type: string
      create_time:
        type: string
      cumulative_booked_capacity_ton:
        type: number
      line:
        allOf:
        - $ref: '#/definitions/model.ShippingLine'
        description: Relationships
      line_id:
        type: integer
      note_id:
        type: integer
      operation_type:
        type: string
      quantity:
        type: number
      sequence_no:
        type: integer
      subtotal:
        type: number
      unit_price:
        type: number
      update_time:
        type: string
      vessel:
        $ref: '#/definitions/model.Vessel'
      vessel_id:
        type: integer
      volume_cubic_meter:
        type: number
      voyage_date:
        type: string
      weight_ton:
        type: number
    type: object
  response.PageMeta:
    properties:
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  response.PageResponse:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
      meta:
        $ref: '#/definitions/response.PageMeta'
    type: object
  response.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  service.CargoItem:
    properties:
      cargo_name:
        type: string
      cargo_type:
        type: string
      quantity:
        type: number
      subtotal:
        type: number
      unit_price:
        type: number
      volume_cub_m:
        type: number
      weight_ton:
        type: number
    type: object
  service.VoyageRecommendation:
    properties:
      lineID:
        format: int64
        type: integer
      lineName:
        type: string
      remainingCapacity:
        format: float64
        type: number
      vesselID:
        format: int64
        type: integer
      vesselName:
        type: string
      voyageDate:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
    url: http://www.example.com/support
  description: Backend API for Maritime Transport System (MTS)
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: MTS Shipping Management API
  version: "1.0"
paths:
  /admin/password/{id}:
    post:
      consumes:
      - application/json
      description: Change password for an admin account
      parameters:
      - description: Admin ID
        in: path
        name: id
        required: true
        type: integer
      - description: Password update data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.updateAdminPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password updated
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  properties:
                    message:
                      type: string
                  type: object
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Admin not found
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Update admin password
      tags:
      - Admin
  /admin/register:
    post:
      consumes:
      - application/json
      description: Create a new administrator account (only accessible by existing
        admin)
      parameters:
      - description: Admin creation data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.createAdminRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Admin created
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.Admin'
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden (requires admin role)
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Create admin
      tags:
      - Admin
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates user based on role and returns JWT tokens
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  properties:
                    access_token:
                      type: string
                    refresh_token:
                      type: string
                    role:
                      type: string
                    user_id:
                      type: integer
                  type: object
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
      summary: User login
      tags:
      - Authentication
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Obtain a new access token using the refresh token
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Token refreshed
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  properties:
                    access_token:
                      type: string
                  type: object
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Invalid refresh token
          schema:
            $ref: '#/definitions/response.Response'
      summary: Refresh access token
      tags:
      - Authentication
  /export/orders:
    get:
      description: Download orders for a specific shipper as an Excel file
      parameters:
      - description: Shipper company ID
        in: query
        name: shipper_company_id
        required: true
        type: integer
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Export orders to Excel
      tags:
      - Import/Export
  /export/ports:
    get:
      description: Download all ports as an Excel file
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Export ports to Excel
      tags:
      - Import/Export
  /export/shipping-lines:
    get:
      description: Download all shipping lines as an Excel file
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Export shipping lines to Excel
      tags:
      - Import/Export
  /export/vessels:
    get:
      description: Download all vessels as an Excel file
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Export vessels to Excel
      tags:
      - Import/Export
  /import/ports:
    post:
      consumes:
      - multipart/form-data
      description: Upload an Excel file to add new ports
      parameters:
      - description: Excel file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  properties:
                    imported:
                      type: integer
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Import ports from Excel
      tags:
      - Import/Export
  /import/shipping-lines:
    post:
      consumes:
      - multipart/form-data
      description: Upload an Excel file to add new shipping lines
      parameters:
      - description: Excel file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  properties:
                    imported:
                      type: integer
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Import shipping lines from Excel
      tags:
      - Import/Export
  /import/vessels:
    post:
      consumes:
      - multipart/form-data
      description: Upload an Excel file to add new vessels
      parameters:
      - description: Excel file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  properties:
                    imported:
                      type: integer
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Import vessels from Excel
      tags:
      - Import/Export
  /orders:
    get:
      description: Get paginated list of orders for a specific shipper with sorting
      parameters:
      - description: Shipper company ID
        in: query
        name: shipper_company_id
        required: true
        type: integer
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: page_size
        type: integer
      - default: create_time
        description: Sort field
        enum:
        - create_time
        - order_no
        - total_weight_ton
        - order_status
        in: query
        name: sort_by
        type: string
      - default: desc
        description: Sort order
        enum:
        - asc
        - desc
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Orders list
          schema:
            allOf:
            - $ref: '#/definitions/response.PageResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.ShippingOrder'
                  type: array
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: List orders
      tags:
      - Orders
    post:
      consumes:
      - application/json
      description: Create a shipping order with multiple cargo items and automatic
        capacity check
      parameters:
      - description: Order creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.createOrderRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Order created
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.ShippingOrder'
              type: object
        "400":
          description: Bad request (invalid parameters or insufficient capacity)
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Create order
      tags:
      - Orders
  /orders/{id}:
    get:
      description: Get detailed information of a specific order
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Order found
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.ShippingOrder'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Order not found
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Get order details
      tags:
      - Orders
  /orders/{id}/cancel:
    post:
      description: Cancel an order and release occupied capacity
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Order cancelled
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  properties:
                    message:
                      type: string
                  type: object
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Order not found
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Cancel order
      tags:
      - Orders
  /orders/{id}/status:
    put:
      consumes:
      - application/json
      description: Change order status (0=draft,1=confirmed,2=in transit,3=completed,4=cancelled)
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      - description: New status
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.updateOrderStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Status updated
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  properties:
                    message:
                      type: string
                  type: object
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
